<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard supervisor — Quiniela del Tri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch:#163B2C; --pitch-deep:#0E2A20; --chalk:#F6F3EA; --gold:#C9962E; --rojo:#B5342A;
    --line: rgba(246,243,234,0.16); --oro:#C9962E; --plata:#C9C9C9; --bronce:#C18A52;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:var(--pitch-deep); color:var(--chalk); min-height:100vh; padding:32px 16px 60px; }
  .wrap{ max-width:920px; margin:0 auto; }
  h1{ font-family:'Oswald',sans-serif; font-weight:700; font-size:26px; text-transform:uppercase; margin:0 0 4px; }
  .eyebrow{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gold); margin:0 0 6px; }
  .sub{ color:rgba(246,243,234,0.6); font-size:13.5px; margin:0 0 26px; }

  .card{ background:var(--pitch); border:1px solid rgba(246,243,234,0.12); border-radius:12px; padding:22px 24px; margin-bottom:22px; }
  .login-row{ display:flex; gap:10px; max-width:360px; }
  input[type=password], input[type=text], select{ background:rgba(246,243,234,0.06); border:1px solid rgba(246,243,234,0.22); border-radius:6px; color:var(--chalk); padding:9px 11px; font-size:14px; font-family:'Inter',sans-serif; }
  input[type=number]{ background:var(--pitch-deep); border:1px solid var(--line); border-radius:6px; color:var(--gold); font-family:'Space Mono',monospace; font-weight:700; font-size:15px; text-align:center; padding:7px 0; width:64px; }
  select option{ color:#111; }
  button{ background:var(--gold); color:var(--pitch-deep); border:none; border-radius:6px; padding:9px 16px; font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:0.02em; text-transform:uppercase; font-size:13px; cursor:pointer; }
  button.secondary{ background:transparent; color:var(--gold); border:1px solid var(--gold); }
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  .status{ font-family:'Space Mono',monospace; font-size:12px; margin-top:10px; }
  .status.ok{ color:#8FCB8A; } .status.err{ color:#E2918A; }

  #appPanel{ display:none; }

  .section-label{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin:0 0 14px; display:flex; align-items:center; gap:8px; }
  .section-label::before{ content:''; width:14px;height:1px; background:var(--gold); display:inline-block; }

  .results-grid{ display:grid; grid-template-columns: 1fr; gap:10px; }
  .result-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .result-row .label{ font-family:'Oswald',sans-serif; font-size:13.5px; text-transform:uppercase; min-width:150px; }
  .result-row label.mini{ font-size:11px; color:rgba(246,243,234,0.55); margin-right:4px; }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th, td{ border:1px solid var(--line); padding:8px 7px; text-align:center; }
  th{ background:rgba(246,243,234,0.06); color:var(--gold); font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase; }
  td:first-child, th:first-child{ text-align:left; }
  td.total{ font-family:'Space Mono',monospace; font-weight:700; color:var(--gold); font-size:14px; }
  tr.gold td{ background:rgba(201,150,46,0.16); }
  tr.silver td{ background:rgba(199,199,199,0.1); }
  tr.bronze td{ background:rgba(193,138,82,0.14); }
  .pos{ font-family:'Space Mono',monospace; font-weight:700; }
  .empty{ color:rgba(246,243,234,0.4); font-style:italic; font-size:13px; }
  .tablewrap{ overflow-x:auto; }
  .refresh-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Mundial 2026 · Panel privado</p>
  <h1>Dashboard del supervisor</h1>
  <p class="sub">Captura los resultados reales y consulta el ranking calculado automáticamente.</p>

  <div class="card" id="loginCard">
    <p class="section-label">Acceso</p>
    <div class="login-row">
      <input type="password" id="pass" placeholder="Clave del organizador">
      <button id="loginBtn">Entrar</button>
    </div>
    <p class="status" id="loginStatus"></p>
  </div>

  <div id="appPanel">

    <div class="card">
      <p class="section-label">Resultados reales por ronda</p>
      <div class="results-grid" id="resultsRounds"></div>
      <div style="margin-top:16px; display:flex; gap:24px; flex-wrap:wrap;">
        <div>
          <label class="mini" style="display:block; margin-bottom:5px;">Fase final alcanzada por México</label>
          <select id="realFase">
            <option value="">Sin definir</option>
            <option>Dieciseisavos</option>
            <option>Octavos de Final</option>
            <option>Cuartos de Final</option>
            <option>Semifinal</option>
            <option>Final</option>
            <option>Campeón</option>
          </select>
        </div>
        <div>
          <label class="mini" style="display:block; margin-bottom:5px;">Goleador real del Tri</label>
          <select id="realGoleador">
            <option value="">Sin definir</option>
            <option>Raúl Jiménez</option>
            <option>Santiago Giménez</option>
            <option>Julián Quiñones</option>
            <option>Luis Romo</option>
            <option>Hirving Lozano</option>
            <option>Édson Álvarez</option>
            <option>Orbelín Pineda</option>
            <option>Otro</option>
          </select>
        </div>
      </div>
      <button id="saveResultsBtn" style="margin-top:18px;">Guardar resultados</button>
      <p class="status" id="resultsStatus"></p>
    </div>

    <div class="card">
      <div class="refresh-bar">
        <p class="section-label" style="margin:0;">Tabla de clasificación</p>
        <button class="secondary" id="refreshBtn">Actualizar</button>
      </div>
      <div class="tablewrap" id="leaderboardWrap"><p class="empty">Cargando…</p></div>
    </div>

  </div>
</div>

<script>
const ROUNDS = ["Dieciseisavos","Octavos de Final","Cuartos de Final","Semifinal","Final"];
let PASSWORD = "";

const resultsRoundsDiv = document.getElementById('resultsRounds');
ROUNDS.forEach((r,i) => {
  const row = document.createElement('div');
  row.className = 'result-row';
  row.innerHTML = `
    <span class="label">${r}</span>
    <label class="mini">MX</label><input type="number" min="0" max="15" id="rmx-${i}">
    <label class="mini">Rival</label><input type="number" min="0" max="15" id="rrv-${i}">
  `;
  resultsRoundsDiv.appendChild(row);
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const pass = document.getElementById('pass').value;
  const loginStatus = document.getElementById('loginStatus');
  loginStatus.textContent = 'Verificando…';
  loginStatus.className = 'status';
  const data = await fetchAdminData(pass);
  if(data.error){
    loginStatus.textContent = data.error;
    loginStatus.className = 'status err';
    return;
  }
  PASSWORD = pass;
  document.getElementById('loginCard').style.display = 'none';
  document.getElementById('appPanel').style.display = 'block';
  populate(data);
});

async function fetchAdminData(pass){
  try{
    const res = await fetch('/api/admin-data', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if(!res.ok) return { error: data.error || 'Error' };
    return data;
  }catch(e){
    return { error: 'No se pudo conectar' };
  }
}

function populate(data){
  ROUNDS.forEach((r,i) => {
    const real = data.results.rounds && data.results.rounds[i];
    document.getElementById('rmx-'+i).value = real?.mx ?? '';
    document.getElementById('rrv-'+i).value = real?.rv ?? '';
  });
  document.getElementById('realFase').value = data.results.fase || '';
  document.getElementById('realGoleador').value = data.results.goleador || '';
  renderLeaderboard(data.leaderboard);
}

function renderLeaderboard(list){
  const wrap = document.getElementById('leaderboardWrap');
  if(!list || list.length === 0){
    wrap.innerHTML = '<p class="empty">Todavía nadie ha registrado su boleto.</p>';
    return;
  }
  let html = '<table><thead><tr><th>#</th><th>Nombre</th>';
  ROUNDS.forEach(r => html += `<th>${r}</th>`);
  html += '<th>Fase</th><th>Goleador</th><th>Total</th></tr></thead><tbody>';
  list.forEach((d, idx) => {
    const pos = idx+1;
    const cls = pos===1 ? 'gold' : pos===2 ? 'silver' : pos===3 ? 'bronze' : '';
    html += `<tr class="${cls}"><td class="pos">${pos}</td><td>${d.name}</td>`;
    ROUNDS.forEach((r,i) => {
      const rd = d.rounds?.[i];
      const txt = rd && rd.mx !== '' && rd.mx !== undefined && rd.rv !== '' && rd.rv !== undefined ? `${rd.mx}-${rd.rv}` : '—';
      html += `<td>${txt}</td>`;
    });
    html += `<td>${d.fase || '—'}</td><td>${d.goleador || '—'}</td><td class="total">${d.total}</td></tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

document.getElementById('saveResultsBtn').addEventListener('click', async () => {
  const rounds = ROUNDS.map((r,i) => ({
    mx: document.getElementById('rmx-'+i).value,
    rv: document.getElementById('rrv-'+i).value
  }));
  const fase = document.getElementById('realFase').value;
  const goleador = document.getElementById('realGoleador').value;
  const statusEl = document.getElementById('resultsStatus');
  statusEl.textContent = 'Guardando…';
  statusEl.className = 'status';
  try{
    const res = await fetch('/api/set-results', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: PASSWORD, rounds, fase, goleador })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Error');
    statusEl.textContent = 'Resultados guardados.';
    statusEl.className = 'status ok';
    const fresh = await fetchAdminData(PASSWORD);
    if(!fresh.error) renderLeaderboard(fresh.leaderboard);
  }catch(e){
    statusEl.textContent = 'No se pudo guardar: ' + e.message;
    statusEl.className = 'status err';
  }
});

document.getElementById('refreshBtn').addEventListener('click', async () => {
  const data = await fetchAdminData(PASSWORD);
  if(!data.error) renderLeaderboard(data.leaderboard);
});
</script>
</body>
</html>
